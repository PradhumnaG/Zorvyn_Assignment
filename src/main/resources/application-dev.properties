# Development Profile Configuration
# Activate with: --spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/my_database?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Security Configuration (Disabled for Development)
app.security.enabled=true

# Actuator Configuration (All endpoints exposed for development)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Basic Authentication for Actuator (Development credentials)
spring.security.user.name=dev
spring.security.user.password=dev123

# Logging Configuration
logging.level.root=INFO
logging.level.com.finance.zorvyn=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - [%thread] - %-5level %logger{36} - %msg%n

# Server Configuration
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true
server.error.include-binding-errors=always
